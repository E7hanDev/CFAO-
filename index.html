<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ford Malawi | CFAO Mobility</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a0/Ford_Motor_Company_Logo.svg" class="logo" alt="Ford">
        <div class="menu-btn">MENU ≡</div>
    </nav>

    <div class="breadcrumb">HOME > LOCATE A DEALER > BLANTYRE</div>

    <section class="locator">
        <h1>LOCATE A DEALER</h1>
        
        <div class="dealer-list">
            <div class="dealer-card active">
                <span>🏢</span> CFAO MOTORS - BLANTYRE
            </div>
            <div class="dealer-card">
                <span>🏢</span> CFAO MOTORS - LILONGWE
            </div>
            <div class="dealer-card">
                <span>🏢</span> CFAO MOTORS - MZUZU
            </div>
        </div>

        <h2 class="branch-title">CFAO MOTORS - <br>BLANTYRE</h2>

        <div class="quick-links">
            <div class="icon-item">
                <div class="icon-box">🚗</div>
                <p>New Vehicles</p>
            </div>
            <div class="icon-item">
                <div class="icon-box">⚙️</div>
                <p>Aftersales</p>
            </div>
            <div class="icon-item">
                <div class="icon-box">🤝</div>
                <p>Company Sales</p>
            </div>
        </div>
    </section>

    <div class="footer-btns">
        <button class="contact-btn">CONTACT US</button>
        <button class="go-btn">GO</button>
    </div>

</body>
</html>
